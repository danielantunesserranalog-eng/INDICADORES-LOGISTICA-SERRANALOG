<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Histórico de Jornadas - Serrana Florestal</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-slate-900 min-h-screen text-slate-200 selection:bg-sky-500/30 flex overflow-hidden">

    <aside id="sidebar-container" class="w-72 bg-slate-800/80 border-r border-slate-700/50 backdrop-blur-xl flex flex-col justify-between h-screen shadow-2xl relative z-20 flex-shrink-0"></aside>

    <main class="flex-1 h-screen overflow-y-auto relative">
        <div class="max-w-[96rem] mx-auto px-6 py-8">
            <div class="flex justify-between items-center mb-8 bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50 backdrop-blur-sm">
                <div>
                    <h1 class="text-2xl font-extrabold text-white">Histórico de Jornadas</h1>
                    <p class="text-sm text-slate-400 font-medium">Consulte, pesquise e audite a base de dados de motoristas na nuvem</p>
                </div>
            </div>

            <section class="animate-fade-in space-y-6">
                <div class="glass-card rounded-xl shadow-2xl overflow-hidden border border-slate-700/50 flex flex-col h-[calc(100vh-12rem)]">
                    <div class="bg-slate-800/80 px-6 py-5 border-b border-slate-700 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <h3 class="font-bold text-white tracking-wide flex items-center text-lg">
                            <i class="fas fa-database text-amber-500 mr-3"></i> Tabela Geral de Jornadas
                        </h3>
                        <div class="flex items-center gap-3 w-full sm:w-auto relative">
                            <i class="fas fa-search absolute left-4 text-slate-500"></i>
                            <input type="text" id="searchHistoricoJornadas" placeholder="Buscar por motorista ou placa..." class="bg-slate-900 text-white text-sm rounded-lg border border-slate-600 pl-10 pr-4 py-2 focus:outline-none focus:border-amber-500 w-full sm:w-72 shadow-inner placeholder-slate-500 transition-colors">
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto flex-1 overflow-y-auto custom-scrollbar">
                        <table class="min-w-full text-sm text-left">
                            <thead class="bg-slate-900/95 text-slate-400 font-semibold uppercase text-[11px] tracking-wider border-b border-slate-700 sticky top-0 z-10 shadow-md backdrop-blur-sm">
                                <tr>
                                    <th class="px-6 py-4 whitespace-nowrap">Motorista</th>
                                    <th class="px-6 py-4">Placa</th>
                                    <th class="px-6 py-4">Início</th>
                                    <th class="px-6 py-4">Fim</th>
                                    <th class="px-6 py-4 text-center">T. Trabalho</th>
                                    <th class="px-6 py-4 text-center">Direção</th>
                                    <th class="px-6 py-4 text-center">Refeição</th>
                                    <th class="px-6 py-4 text-center">Repouso</th>
                                    <th class="px-6 py-4 text-center">Status</th>
                                </tr>
                            </thead>
                            <tbody id="historicoJornadasBody" class="divide-y divide-slate-800/80 text-slate-300"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/common.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/historico-jornadas.js"></script>
</body>
</html>
