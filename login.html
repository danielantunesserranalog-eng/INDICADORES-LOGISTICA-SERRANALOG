<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Serrana Florestal</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="bg-[#0b1120] min-h-screen text-slate-200 flex items-center justify-center overflow-hidden relative selection:bg-sky-500/30">

    <div class="absolute inset-0 w-full h-full overflow-hidden pointer-events-none flex justify-center items-center">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-sky-600/20 rounded-full mix-blend-screen filter blur-[100px] opacity-70 animate-blob"></div>
        <div class="absolute top-1/3 right-1/4 w-96 h-96 bg-emerald-600/10 rounded-full mix-blend-screen filter blur-[100px] opacity-70 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-32 left-1/3 w-96 h-96 bg-blue-600/20 rounded-full mix-blend-screen filter blur-[100px] opacity-70 animate-blob animation-delay-4000"></div>
    </div>

    <div class="w-full max-w-md p-6 relative z-10 animate-fade-in">
        <div class="glass-panel rounded-3xl shadow-2xl p-8 sm:p-10 relative overflow-hidden">
            
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-sky-500 to-transparent opacity-50"></div>
            
            <div class="text-center mb-10 relative">
                <div class="relative inline-block mb-3">
                    <div class="absolute inset-0 bg-sky-500/20 blur-[30px] rounded-full"></div>
                    <img src="assets/logo.png" alt="SerranaLog" class="h-28 mx-auto object-contain relative z-10 drop-shadow-2xl transition-transform hover:scale-105 duration-500" onerror="this.src='assets/logoverde.png'; this.onerror=null;">
                </div>
                
                <h1 class="text-2xl font-black text-white tracking-widest uppercase mt-4">Torre de Controle</h1>
                <p class="text-[10px] text-sky-400 font-bold tracking-widest mt-3 bg-sky-900/30 inline-block px-4 py-1.5 rounded-full border border-sky-800/50 shadow-inner">
                    <i class="fas fa-truck text-sky-500 mr-1"></i> SERRANALOG TRANSPORTES
                </p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div class="space-y-1">
                    <label for="username" class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Usuário</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-sky-400 transition-colors">
                            <i class="fas fa-user"></i>
                        </div>
                        <input type="text" id="username" required autocomplete="off"
                            class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl pl-11 pr-4 py-3.5 text-white placeholder-slate-600 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all shadow-inner uppercase font-semibold text-sm tracking-wide"
                            placeholder="EX: DANIEL.RIBEIRO">
                    </div>
                </div>

                <div class="space-y-1">
                    <label for="password" class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Senha</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-sky-400 transition-colors">
                            <i class="fas fa-lock"></i>
                        </div>
                        <input type="password" id="password" required 
                            class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl pl-11 pr-4 py-3.5 text-white placeholder-slate-600 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all shadow-inner font-semibold tracking-widest text-lg"
                            placeholder="••••••••">
                    </div>
                </div>

                <div id="errorMsg" class="hidden bg-rose-950/50 border border-rose-800/50 text-rose-300 text-xs px-4 py-3 rounded-xl flex items-start gap-3 backdrop-blur-sm animate-fade-in">
                    <i class="fas fa-exclamation-circle text-rose-500 text-lg mt-0.5"></i>
                    <span id="errorText" class="font-medium leading-relaxed">Usuário ou senha incorretos.</span>
                </div>

                <button type="submit" id="btnLogin" class="w-full relative overflow-hidden group bg-gradient-to-r from-sky-600 to-blue-600 hover:from-sky-500 hover:to-blue-500 text-white font-bold py-4 px-4 rounded-xl shadow-[0_0_20px_rgba(2,132,199,0.3)] hover:shadow-[0_0_30px_rgba(2,132,199,0.5)] transition-all flex items-center justify-center gap-2 mt-4">
                    <div class="absolute inset-0 w-full h-full bg-white/20 group-hover:translate-x-full -translate-x-full transition-transform duration-500 ease-out skew-x-12"></div>
                    
                    <span class="relative z-10 uppercase tracking-widest text-sm">Acessar Plataforma</span> 
                    <i class="fas fa-arrow-right relative z-10 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>

            <div class="mt-8 text-center border-t border-slate-700/50 pt-5">
                <p class="text-[10px] text-slate-500 font-mono tracking-wider flex items-center justify-center gap-2">
                    <i class="fas fa-shield-alt text-emerald-500/70"></i> Conectado ao Banco Central Seguro
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/login.js"></script>
</body>
</html>
