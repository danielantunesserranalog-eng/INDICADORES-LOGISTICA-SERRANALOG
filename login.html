<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Serrana Florestal</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-slate-900 min-h-screen text-slate-200 selection:bg-sky-500/30 flex items-center justify-center overflow-hidden relative">

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-sky-600/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-emerald-600/20 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-md p-6 relative z-10 animate-fade-in">
        <div class="glass-card rounded-3xl border border-slate-700/50 shadow-2xl p-8 backdrop-blur-xl bg-slate-800/80">
            
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-slate-900/80 rounded-2xl border border-slate-700/50 flex items-center justify-center mx-auto mb-4 shadow-inner">
                    <i class="fas fa-satellite-dish text-4xl text-sky-400"></i>
                </div>
                <h1 class="text-2xl font-black text-white tracking-wide uppercase">Torre de Controle</h1>
                <p class="text-xs text-slate-400 font-bold tracking-widest mt-1">SERRANALOG TRANSPORTES</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label for="username" class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Usuário</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-user text-slate-500"></i>
                        </div>
                        <input type="text" id="username" required autocomplete="off"
                            class="w-full bg-slate-900/80 border border-slate-600 rounded-xl pl-11 pr-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all shadow-inner uppercase"
                            placeholder="EX: DANIEL.RIBEIRO">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Senha</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-slate-500"></i>
                        </div>
                        <input type="password" id="password" required 
                            class="w-full bg-slate-900/80 border border-slate-600 rounded-xl pl-11 pr-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all shadow-inner"
                            placeholder="••••••••">
                    </div>
                </div>

                <div id="errorMsg" class="hidden bg-rose-900/40 border border-rose-800/50 text-rose-300 text-xs px-4 py-3 rounded-xl flex items-center gap-3">
                    <i class="fas fa-exclamation-circle text-rose-400 text-lg"></i>
                    <span id="errorText">Usuário ou senha incorretos.</span>
                </div>

                <button type="submit" id="btnLogin" class="w-full bg-gradient-to-r from-sky-600 to-blue-600 hover:from-sky-500 hover:to-blue-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-[0_0_15px_rgba(2,132,199,0.3)] hover:shadow-[0_0_25px_rgba(2,132,199,0.5)] transition-all flex items-center justify-center gap-2 mt-2">
                    <span>Acessar Sistema</span> <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="mt-8 text-center border-t border-slate-700/50 pt-4">
                <p class="text-[10px] text-slate-500 font-mono">Conectado ao Banco Central <i class="fas fa-database ml-1 text-slate-600"></i></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/login.js"></script>
</body>
</html>
